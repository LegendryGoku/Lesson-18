<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fancy Bootstrap Cards</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card img {
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .btn-custom {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <h2 class="text-center text-white mb-4">✨ Fancy Card Section</h2>

    <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3AnRq2oEMHCK1dtvBlZbwiBtDOUAw0Gtxjw&s" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Adventure</h5>
                    <p class="card-text">Explore amazing places and enjoy thrilling experiences.</p>
                    <a href="#" class="btn btn-primary btn-custom">Explore</a>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvbbxYUZV8GSQOzwrwDPqQr_NA0eYIaM3iaQ&s" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Hacking</h5>
                    <p class="card-text">Discover the latest innovations in the tech world.</p>
                    <a href="#" class="btn btn-success btn-custom">Learn More</a>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4">
            <div class="card" style="width: 20rem; height: fit-content;">
                <img src="https://img.freepik.com/free-vector/creativity-innovation-concept-illustration_53876-62581.jpg?semt=ais_hybrid&w=740&q=80" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Creativity</h5>
                    <p class="card-text">Unleash your imagination and build something amazing.</p>
                    <a href="#" class="btn btn-danger btn-custom">Start Now</a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
